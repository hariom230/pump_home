<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehra Lab | Water Control Panel</title>
    <!-- MQTT Over WebSockets Client Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-red: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100ve;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 1px solid #334155;
            padding-bottom: 16px;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 4px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f172a;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 0.875rem;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            background-color: var(--accent-red);
            margin-right: 6px;
            transition: background-color 0.3s ease;
        }

        .status-dot.connected {
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }

        .monitor-panel {
            text-align: center;
            background: #0f172a;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid #334155;
        }

        .monitor-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .monitor-value {
            font-size: 1.75rem;
            font-weight: 800;
            margin-top: 8px;
            color: var(--accent-blue);
        }

        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input[type="number"] {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--accent-blue);
        }

        .btn-stack {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        button {
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-start {
            background-color: var(--accent-green);
            color: #0f172a;
        }

        .btn-stop {
            background-color: var(--accent-red);
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>System Control Panel</h1>
        <p>Mehra Lab Water Management Automation</p>
    </header>

    <div class="status-bar">
        <span>Broker Connection:</span>
        <div>
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text">Disconnected</span>
        </div>
    </div>

    <div class="monitor-panel">
        <div class="monitor-label">Pump Telemetry Tracking</div>
        <div id="pump-status" class="monitor-value">Offline / Idle</div>
    </div>

    <div class="control-group">
        <label for="timer-input">Set Custom Run Time (Minutes)</label>
        <input type="number" id="timer-input" min="1" max="120" value="10" placeholder="e.g. 10">
    </div>

    <div class="btn-stack">
        <button class="btn-start" onclick="startPump()">Start Pump</button>
        <button class="btn-stop" onclick="stopPump()">Force Stop</button>
    </div>
</div>

<script>
    // ==========================================
    //       MQTT CONFIGURATION (WebSockets)
    // ==========================================
    // NOTE: For browsers to connect, your MQTT Broker must have a WebSockets listener active.
    const MQTT_HOST = "broker.hivemq.com"; 
    const MQTT_PORT = 8000; // Standard WebSockets port for MQTT (NOT 1883)
    const CLIENT_ID = "WebPanel_" + Math.random().toString(16).substr(2, 8);

    // Topics Matching ESP8266 Architecture
    const TOPIC_SWITCH = "home/pump/switch";
    const TOPIC_TIMER_SET = "home/pump/timer_set";
    const TOPIC_STATUS = "home/pump/status";

    // Initialize Paho Client
    const client = new Paho.MQTT.Client(MQTT_HOST, Number(MQTT_PORT), CLIENT_ID);

    // Event Loop Callbacks
    client.onConnectionLost = onConnectionLost;
    client.onMessageArrived = onMessageArrived;

    // Trigger Connection Profile
    connectBroker();

    function connectBroker() {
        const options = {
            onSuccess: onConnect,
            onFailure: onFailure,
            keepAliveInterval: 30,
            useSSL: false // Change to true if broker supports secure secure websockets (WSS)
            // userName: "YOUR_USERNAME",  // Uncomment if required
            // password: "YOUR_PASSWORD"   // Uncomment if required
        };
        client.connect(options);
    }

    function onConnect() {
        document.getElementById("status-dot").className = "status-dot connected";
        document.getElementById("status-text").innerText = "Connected";
        
        // Subscribe to live status tracking updates
        client.subscribe(TOPIC_STATUS);
        client.subscribe(TOPIC_SWITCH);
    }

    function onFailure(message) {
        document.getElementById("status-text").innerText = "Connection Failed";
        setTimeout(connectBroker, 5000); // Retry loop after 5 seconds
    }

    function onConnectionLost(responseObject) {
        document.getElementById("status-dot").className = "status-dot";
        document.getElementById("status-text").innerText = "Disconnected";
        if (responseObject.errorCode !== 0) {
            setTimeout(connectBroker, 5000);
        }
    }

    function onMessageArrived(message) {
        if (message.destinationName === TOPIC_STATUS) {
            document.getElementById("pump-status").innerText = message.payloadString;
        }
        if (message.destinationName === TOPIC_SWITCH) {
            if(message.payloadString === "OFF") {
                document.getElementById("pump-status").innerText = "Offline / Idle";
            }
        }
    }

    // ==========================================
    //            UI ACTION LINKAGES
    // ==========================================

    function startPump() {
        const timerValue = document.getElementById("timer-input").value;
        if (!timerValue || timerValue <= 0) {
            alert("Please enter a valid time duration.");
            return;
        }

        // 1. Dispatch custom runtime countdown configuration
        const timerMessage = new Paho.MQTT.Message(timerValue.toString());
        timerMessage.destinationName = TOPIC_TIMER_SET;
        timerMessage.qos = 1;
        client.send(timerMessage);

        // 2. Fire execution activation trigger sequence
        const switchMessage = new Paho.MQTT.Message("ON");
        switchMessage.destinationName = TOPIC_SWITCH;
        switchMessage.qos = 1;
        client.send(switchMessage);
    }

    function stopPump() {
        const message = new Paho.MQTT.Message("OFF");
        message.destinationName = TOPIC_SWITCH;
        message.qos = 1;
        client.send(message);
    }
</script>
</body>
</html>
