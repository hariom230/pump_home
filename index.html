<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hrx_MehraLab_Bilaspur | Water Control Panel</title>
    <!-- MQTT Over WebSockets Client Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-red: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 1px solid #334155;
            padding-bottom: 16px;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 4px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f172a;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 0.875rem;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            background-color: var(--accent-red);
            margin-right: 6px;
            transition: background-color 0.3s ease;
        }

        .status-dot.connected {
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }

        .grid-monitor {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-bottom: 24px;
        }

        .monitor-panel {
            text-align: center;
            background: #0f172a;
            padding: 18px;
            border-radius: 16px;
            border: 1px solid #334155;
        }

        .monitor-label {
            font-size: 0.825rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .monitor-value {
            font-size: 1.5rem;
            font-weight: 800;
            margin-top: 6px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input[type="number"] {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--accent-blue);
        }

        .btn-stack {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        button {
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-start {
            background-color: var(--accent-green);
            color: #0f172a;
        }

        .btn-stop {
            background-color: var(--accent-red);
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>System Control Panel</h1>
        <p>hrx_MehraLab_Bilaspur Water Management Automation</p>
    </header>

    <div class="status-bar">
        <span>Web Dashboard Link:</span>
        <div>
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text">Disconnected</span>
        </div>
    </div>

    <div class="grid-monitor">
        <div class="monitor-panel">
            <div class="monitor-label">Pump Network Status</div>
            <div id="pump-network-status" class="monitor-value" style="color: var(--accent-red);">Disconnected</div>
        </div>
        
        <div class="monitor-panel">
            <div class="monitor-label">Current Run State</div>
            <div id="pump-run-status" class="monitor-value" style="color: var(--text-muted);">Idle</div>
        </div>
    </div>

    <div class="control-group">
        <label for="timer-input">Set Custom Run Time (Minutes)</label>
        <input type="number" id="timer-input" min="1" max="120" value="10" placeholder="e.g. 10">
    </div>

    <div class="btn-stack">
        <button class="btn-start" onclick="startPump()">Start Pump</button>
        <button class="btn-stop" onclick="stopPump()">Force Stop</button>
    </div>
</div>

<script>
    const MQTT_HOST = "broker.hivemq.com"; 
    const MQTT_PORT = 8884; 
    const CLIENT_ID = "WebPanel_" + Math.random().toString(16).substr(2, 8);

    // Updated with 'hrx' Unique Namespace Sub-Topic Structure
    const TOPIC_SWITCH = "hrx_ml_bsp_wlvl_9482/node_esp8266/io_exec_switch";
    const TOPIC_TIMER_SET = "hrx_ml_bsp_wlvl_9482/node_esp8266/config_runtime_min";
    const TOPIC_STATUS = "hrx_ml_bsp_wlvl_9482/node_esp8266/telemetry_link_status";
    const TOPIC_TELEMETRY = "hrx_ml_bsp_wlvl_9482/node_esp8266/telemetry_runtime_state";

    const client = new Paho.MQTT.Client(MQTT_HOST, Number(MQTT_PORT), CLIENT_ID);

    client.onConnectionLost = onConnectionLost;
    client.onMessageArrived = onMessageArrived;

    connectBroker();

    function connectBroker() {
        const options = {
            onSuccess: onConnect,
            onFailure: onFailure,
            keepAliveInterval: 10,
            useSSL: true 
        };
        client.connect(options);
    }

    function onConnect() {
        document.getElementById("status-dot").className = "status-dot connected";
        document.getElementById("status-text").innerText = "Connected";
        
        client.subscribe(TOPIC_STATUS);
        client.subscribe(TOPIC_TELEMETRY);
    }

    function onFailure(message) {
        document.getElementById("status-text").innerText = "Connection Failed";
        setTimeout(connectBroker, 3000); 
    }

    function onConnectionLost(responseObject) {
        document.getElementById("status-dot").className = "status-dot";
        document.getElementById("status-text").innerText = "Disconnected";
        
        document.getElementById("pump-network-status").innerText = "Disconnected";
        document.getElementById("pump-network-status").style.color = "var(--accent-red)";
        document.getElementById("pump-run-status").innerText = "Unknown";
        document.getElementById("pump-run-status").style.color = "var(--text-muted)";
        
        if (responseObject.errorCode !== 0) {
            setTimeout(connectBroker, 3000);
        }
    }

    function onMessageArrived(message) {
        if (message.destinationName === TOPIC_STATUS) {
            const payload = message.payloadString;
            document.getElementById("pump-network-status").innerText = payload;
            
            if (payload === "Connected to Broker") {
                document.getElementById("pump-network-status").style.color = "var(--accent-green)";
            } else {
                document.getElementById("pump-network-status").style.color = "var(--accent-red)";
                document.getElementById("pump-run-status").innerText = "Offline";
                document.getElementById("pump-run-status").style.color = "var(--text-muted)";
            }
        }
        
        if (message.destinationName === TOPIC_TELEMETRY) {
            const payload = message.payloadString;
            document.getElementById("pump-run-status").innerText = payload;
            
            if (payload.startsWith("Running")) {
                document.getElementById("pump-run-status").style.color = "var(--accent-blue)";
            } else if (payload === "Idle") {
                document.getElementById("pump-run-status").style.color = "var(--text-muted)";
            } else {
                document.getElementById("pump-run-status").style.color = "var(--accent-green)";
            }
        }
    }

    function startPump() {
        const timerValue = document.getElementById("timer-input").value;
        if (!timerValue || timerValue <= 0) {
            alert("Please enter a valid time duration.");
            return;
        }

        const timerMessage = new Paho.MQTT.Message(timerValue.toString());
        timerMessage.destinationName = TOPIC_TIMER_SET;
        timerMessage.qos = 1;
        client.send(timerMessage);

        const switchMessage = new Paho.MQTT.Message("ON");
        switchMessage.destinationName = TOPIC_SWITCH;
        switchMessage.qos = 1;
        client.send(switchMessage);
    }

    function stopPump() {
        const message = new Paho.MQTT.Message("OFF");
        message.destinationName = TOPIC_SWITCH;
        message.qos = 1;
        client.send(message);
    }
</script>
</body>
</html>
